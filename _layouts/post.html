---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-date">{{ page.date | date: "%Y.%m.%d" }}</div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <nav class="post-nav">
    <a href="{{ '/' | relative_url }}" class="back-link">RETURN TO BULLETIN BOARD</a>
  </nav>
</article>
