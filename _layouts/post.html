---
layout: default
---

<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <div class="post-date">{{ page.date | date: "%Y.%m.%d" }}</div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <nav class="post-nav">
    <div class="post-nav-links">
      {% if page.next %}
      <a href="{{ page.next.url | relative_url }}" class="nav-prev">&lt; {{ page.next.title }}</a>
      {% else %}
      <span class="nav-prev"></span>
      {% endif %}
      {% if page.previous %}
      <a href="{{ page.previous.url | relative_url }}" class="nav-next">{{ page.previous.title }} &gt;</a>
      {% endif %}
    </div>
    <a href="{{ '/' | relative_url }}" class="back-link">RETURN TO BULLETIN BOARD</a>
  </nav>
</article>
