---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <pre class="terminal-pre" id="terminal-text">
 TRANSMISSIONS
──────────────────────────────────────
{% assign sorted_posts = site.posts | sort: 'date' %}{% for post in sorted_posts %}{% if forloop.first %}&gt;{% else %} {% endif %} {{ post.title }}
{% endfor %}</pre>
    </div>
  </div>

  <div class="status-bar">
    <span class="keys"><kbd>↑↓</kbd> SELECT   <kbd>ENTER</kbd> OPEN   <span class="tap-target" data-nav="back"><kbd>Q</kbd> BACK</span></span>
    <span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function() {
  var pre = document.getElementById('terminal-text');
  var menuItems = [];

  {% assign sorted_posts = site.posts | sort: 'date' %}
  {% for post in sorted_posts %}
  menuItems.push({ label: '{{ post.title }}', url: '{{ post.url | relative_url }}' });
  {% endfor %}

  var selected = 0;

  function render() {
    var out = ' TRANSMISSIONS\n';
    out += '──────────────────────────────────────\n';
    for (var i = 0; i < menuItems.length; i++) {
      var marker = (i === selected) ? '>' : ' ';
      out += marker + ' ' + menuItems[i].label + '\n';
    }
    pre.textContent = out;
  }

  render();

  function select(i) {
    if (i < 0 || i >= menuItems.length) return;
    selected = i;
    render();
  }

  function open() {
    var url = menuItems[selected].url;
    if (url) window.location.href = url;
  }

  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'ArrowUp':
      case 'k':
        e.preventDefault();
        select(selected - 1);
        break;
      case 'ArrowDown':
      case 'j':
        e.preventDefault();
        select(selected + 1);
        break;
      case 'Enter':
        e.preventDefault();
        open();
        break;
      case 'q':
      case 'Q':
      case 'Escape':
        window.location.href = '/';
        break;
    }
  });

  // Touch: tap menu item to open
  var headerLines = 2; // title, rule
  pre.addEventListener('click', function(e) {
    var lineHeight = parseFloat(getComputedStyle(pre).lineHeight);
    var rect = pre.getBoundingClientRect();
    var y = e.clientY - rect.top;
    var line = Math.floor(y / lineHeight) - headerLines;
    if (line >= 0 && line < menuItems.length) {
      selected = line;
      render();
      open();
    }
  });

  // Tap nav in status bar
  var backBtn = document.querySelector('[data-nav="back"]');
  if (backBtn) {
    backBtn.addEventListener('click', function() {
      window.location.href = '/';
    });
  }
})();
</script>
