---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <div class="terminal-header">
        TABULA RASA
        <div class="subtitle">Axiom Systems Field Communications Terminal v2.04</div>
      </div>

      <div class="terminal-divider">────────────────────────────────────────────────────────</div>

      <ul class="menu-list" id="menu-list">
        {% for item in page.menu_items %}
        <li class="menu-item{% if forloop.first %} selected{% endif %}" data-url="{{ item.url }}" data-disabled="{{ item.disabled }}">
          <span class="item-marker">{% if forloop.first %}&gt;{% else %} {% endif %}</span>
          <span class="item-label{% if item.disabled %} disabled{% endif %}">{{ item.label }}</span>
        </li>
        {% endfor %}
      </ul>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-bar-inner">
      <span class="keys"><kbd>↑↓</kbd> SELECT   <kbd>ENTER</kbd> OPEN</span>
      <span><span class="cursor"></span></span>
    </div>
  </div>
</div>

<script>
(function() {
  var items = document.querySelectorAll('.menu-item');
  var selected = 0;

  function select(i) {
    if (i < 0 || i >= items.length) return;
    items[selected].classList.remove('selected');
    items[selected].querySelector('.item-marker').textContent = ' ';
    selected = i;
    items[selected].classList.add('selected');
    items[selected].querySelector('.item-marker').textContent = '>';
  }

  function open() {
    var item = items[selected];
    if (item.getAttribute('data-disabled') === 'true') return;
    var url = item.getAttribute('data-url');
    if (url) window.location.href = url;
  }

  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'ArrowUp':
      case 'k':
        e.preventDefault();
        select(selected - 1);
        break;
      case 'ArrowDown':
      case 'j':
        e.preventDefault();
        select(selected + 1);
        break;
      case 'Enter':
        e.preventDefault();
        open();
        break;
    }
  });
})();
</script>
