---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <pre class="terminal-pre" id="terminal-text"></pre>
    </div>
  </div>

  <div class="status-bar">
    <span class="keys"><kbd>↑↓</kbd> SELECT   <kbd>ENTER</kbd> OPEN</span>
    <span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function() {
  var pre = document.getElementById('terminal-text');
  var menuItems = [];

  {% for item in page.menu_items %}
  menuItems.push({ label: '{{ item.label | replace: "'", "\\'" }}', url: '{{ item.url }}', disabled: {{ item.disabled | default: false }} });
  {% endfor %}

  var selected = 0;
  var bright = 'color:var(--phosphor-bright)';
  var dim = 'color:var(--phosphor)';

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render() {
    var h = '<span style="' + dim + '">';
    h += '────────────────────────────\n';
    h += '</span>';
    h += '<span style="' + bright + '">';
    h += '               TABULA RASA\n';
    h += '</span>';
    h += '<span style="' + dim + '">';
    h += '────────────────────────────\n';
    h += '</span>';
    for (var i = 0; i < menuItems.length; i++) {
      var marker = (i === selected) ? '&gt;' : ' ';
      var style = (i === selected) ? bright : dim;
      h += '<span style="' + style + '">';
      h += marker + ' ' + esc(menuItems[i].label) + '\n';
      h += '</span>';
    }
    pre.innerHTML = h;
  }

  render();

  function select(i) {
    if (i < 0 || i >= menuItems.length) return;
    selected = i;
    render();
  }

  function open() {
    if (menuItems[selected].disabled) return;
    var url = menuItems[selected].url;
    if (url) navigateTo(url);
  }

  var sig = { signal: window._pageAbort.signal };

  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'ArrowUp':
      case 'k':
        e.preventDefault();
        select(selected - 1);
        break;
      case 'ArrowDown':
      case 'j':
        e.preventDefault();
        select(selected + 1);
        break;
      case 'Enter':
        e.preventDefault();
        open();
        break;
    }
  }, sig);

  // Touch: tap menu item to open
  var headerLines = 3; // rule, title, rule
  pre.addEventListener('click', function(e) {
    var lineHeight = parseFloat(getComputedStyle(pre).lineHeight);
    var rect = pre.getBoundingClientRect();
    var y = e.clientY - rect.top;
    var line = Math.floor(y / lineHeight) - headerLines;
    if (line >= 0 && line < menuItems.length) {
      selected = line;
      render();
      if (!menuItems[selected].disabled) open();
    }
  });
})();
</script>
