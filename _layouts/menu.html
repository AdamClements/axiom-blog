---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <pre class="terminal-pre" id="terminal-text">
0123456789012345678901234567890123456789
               TABULA RASA
 Axiom Systems Field Terminal v2.04
────────────────────────────────────────
{% for item in page.menu_items %}{% if forloop.first %}&gt;{% else %} {% endif %} {{ item.label }}
{% endfor %}</pre>
    </div>
  </div>

  <div class="status-bar">
    <span class="keys"><kbd>↑↓</kbd> SELECT   <kbd>ENTER</kbd> OPEN</span>
    <span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function() {
  var pre = document.getElementById('terminal-text');
  var lines = pre.textContent.split('\n');
  var menuStart = -1;
  var menuItems = [];

  // Find menu item lines (start with > or have label text after 2 chars indent)
  {% for item in page.menu_items %}
  menuItems.push({ label: '{{ item.label }}', url: '{{ item.url }}', disabled: {{ item.disabled | default: false }} });
  {% endfor %}

  // Find first menu line index
  var allLines = lines.slice();
  for (var i = 0; i < allLines.length; i++) {
    if (allLines[i].match(/^[> ] /)) {
      if (menuStart < 0) menuStart = i;
    }
  }

  var selected = 0;

  function render() {
    for (var i = 0; i < menuItems.length; i++) {
      var lineIdx = menuStart + i;
      var marker = (i === selected) ? '>' : ' ';
      lines[lineIdx] = marker + ' ' + menuItems[i].label;
    }
    pre.textContent = lines.join('\n');
  }

  function select(i) {
    if (i < 0 || i >= menuItems.length) return;
    selected = i;
    render();
  }

  function open() {
    if (menuItems[selected].disabled) return;
    var url = menuItems[selected].url;
    if (url) window.location.href = url;
  }

  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'ArrowUp':
      case 'k':
        e.preventDefault();
        select(selected - 1);
        break;
      case 'ArrowDown':
      case 'j':
        e.preventDefault();
        select(selected + 1);
        break;
      case 'Enter':
        e.preventDefault();
        open();
        break;
    }
  });
})();
</script>
