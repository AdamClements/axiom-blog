---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <pre class="terminal-pre" id="terminal-text">
                         TABULA RASA
 Axiom Systems Field Terminal v2.04
──────────────────────────────────────
{% for item in page.menu_items %}{% if forloop.first %}&gt;{% else %} {% endif %} {{ item.label }}
{% endfor %}</pre>
    </div>
  </div>

  <div class="status-bar">
    <span class="keys"><kbd>↑↓</kbd> SELECT   <kbd>ENTER</kbd> OPEN</span>
    <span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function() {
  var pre = document.getElementById('terminal-text');
  var menuItems = [];

  {% for item in page.menu_items %}
  menuItems.push({ label: '{{ item.label }}', url: '{{ item.url }}', disabled: {{ item.disabled | default: false }} });
  {% endfor %}

  var selected = 0;

  function render() {
    var out = '                         TABULA RASA\n';
    out += ' Axiom Systems Field Terminal v2.04\n';
    out += '──────────────────────────────────────\n';
    for (var i = 0; i < menuItems.length; i++) {
      var marker = (i === selected) ? '>' : ' ';
      out += marker + ' ' + menuItems[i].label + '\n';
    }
    pre.textContent = out;
  }

  render();

  function select(i) {
    if (i < 0 || i >= menuItems.length) return;
    selected = i;
    render();
  }

  function open() {
    if (menuItems[selected].disabled) return;
    var url = menuItems[selected].url;
    if (url) window.location.href = url;
  }

  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'ArrowUp':
      case 'k':
        e.preventDefault();
        select(selected - 1);
        break;
      case 'ArrowDown':
      case 'j':
        e.preventDefault();
        select(selected + 1);
        break;
      case 'Enter':
        e.preventDefault();
        open();
        break;
    }
  });

  // Touch: tap menu item to open
  var headerLines = 3; // title, subtitle, rule
  pre.addEventListener('click', function(e) {
    var lineHeight = parseFloat(getComputedStyle(pre).lineHeight);
    var rect = pre.getBoundingClientRect();
    var y = e.clientY - rect.top;
    var line = Math.floor(y / lineHeight) - headerLines;
    if (line >= 0 && line < menuItems.length) {
      selected = line;
      render();
      if (!menuItems[selected].disabled) open();
    }
  });
})();
</script>
