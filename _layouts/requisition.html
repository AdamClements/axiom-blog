---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <pre class="terminal-pre" id="terminal-text"></pre>
    </div>
  </div>

  <div class="status-bar">
    <span class="keys">
      <span class="tap-target" data-nav="print"><kbd>P</kbd> PRINT FORM</span>
      <span class="tap-target" data-nav="back">  <kbd>Q</kbd> BACK</span>
    </span>
    <span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function() {
  var pre = document.getElementById('terminal-text');

  pre.textContent =
    ' REQUEST OPERATOR\'S MANUAL\n' +
    '────────────────────────────\n' +
    ' Print the requisition form and send\n' +
    ' it with 20 credits to the address\n' +
    ' on the form.\n' +
    '\n' +
    ' Allow 4-6 weeks delivery.\n' +
    ' Physical copies only.';

  function printForm() {
    window.open('{{ "/assets/requisition-form.pdf" | relative_url }}', '_blank');
  }

  var sig = { signal: window._pageAbort.signal };

  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'p':
      case 'P':
        e.preventDefault();
        printForm();
        break;
      case 'q':
      case 'Q':
      case 'Escape':
        navigateTo('/');
        break;
    }
  }, sig);

  document.querySelectorAll('.tap-target').forEach(function(el) {
    el.addEventListener('click', function() {
      var nav = el.getAttribute('data-nav');
      if (nav === 'print') printForm();
      if (nav === 'back') navigateTo('/');
    });
  });
})();
</script>
