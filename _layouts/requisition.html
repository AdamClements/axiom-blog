---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <pre class="terminal-pre" id="terminal-text"></pre>
    </div>
  </div>

  <div class="status-bar">
    <span class="keys">
      <span class="tap-target" data-nav="print"><kbd>P</kbd> PRINT FORM</span>
      <span class="tap-target" data-nav="back">  <kbd>Q</kbd> BACK</span>
    </span>
    <span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function() {
  var pre = document.getElementById('terminal-text');

  pre.textContent =
    ' SUPPLY REQUISITION\n' +
    '──────────────────────────────────────\n' +
    ' ITEM:   TR-16 Operator\'s Manual\n' +
    ' FORMAT: Printed hardcopy, ring-bound\n' +
    ' CLASS:  NO DIGITAL DISTRIBUTION\n' +
    '\n' +
    ' Send completed requisition form\n' +
    ' with 20 credits to:\n' +
    '\n' +
    '   AXIOM SYSTEMS — FIELD SUPPLY\n' +
    '   PO BOX 1016\n' +
    '   SECTOR 7 DISTRIBUTION CENTER\n' +
    '\n' +
    ' Press P to print requisition form.';

  function printForm() {
    window.open('{{ "/assets/requisition-form.pdf" | relative_url }}', '_blank');
  }

  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'p':
      case 'P':
        e.preventDefault();
        printForm();
        break;
      case 'q':
      case 'Q':
      case 'Escape':
        window.location.href = '/';
        break;
    }
  });

  document.querySelectorAll('.tap-target').forEach(function(el) {
    el.addEventListener('click', function() {
      var nav = el.getAttribute('data-nav');
      if (nav === 'print') printForm();
      if (nav === 'back') window.location.href = '/';
    });
  });
})();
</script>
