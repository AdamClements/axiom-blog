---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <pre class="terminal-pre" id="terminal-text"></pre>
    </div>
  </div>

  <div class="status-bar">
    <span class="keys"><span class="tap-target" data-nav="back"><kbd>Q</kbd> BACK</span></span>
    <span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function() {
  var pre = document.getElementById('terminal-text');

  pre.textContent =
    ' ITEM: TR-16 Operator\'s Manual\n' +
    ' FORMAT: Printed hardcopy\n' +
    ' CLASS: NO DIGITAL DISTRIBUTION\n' +
    '──────────────────────────────────────\n' +
    '\n' +
    ' Send 20 credits and a return\n' +
    ' address to:\n' +
    '\n' +
    '   AXIOM SYSTEMS — FIELD SUPPLY\n' +
    '   PO BOX 1016\n' +
    '   SECTOR 7 DISTRIBUTION CENTER\n' +
    '\n' +
    ' Allow 4-6 weeks for delivery.\n' +
    ' Physical copies only.';

  document.addEventListener('keydown', function(e) {
    switch(e.key) {
      case 'q':
      case 'Q':
      case 'Escape':
        window.location.href = '/';
        break;
    }
  });

  var backBtn = document.querySelector('[data-nav="back"]');
  if (backBtn) {
    backBtn.addEventListener('click', function() {
      window.location.href = '/';
    });
  }
})();
</script>
