<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=800, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/crt.css' | relative_url }}">
</head>
<body>
  <div class="rotate-msg">
    <pre>ROTATE TERMINAL TO
LANDSCAPE ORIENTATION</pre>
  </div>
  <div class="scene">
    <div class="scene-frame">
      <img class="scene-img" src="{{ '/assets/bg.png' | relative_url }}" alt="">
    </div>
    <div class="crt-housing">
      <div class="crt" id="boot-screen" style="display:none;">
        <div class="crt-glass"></div>
        <div class="screen">
          <div class="screen-content">
            <pre class="terminal-pre" id="boot-log"></pre>
          </div>
        </div>
      </div>

      <script>window._pageAbort = new AbortController();</script>
      <div id="main-screen" style="display:none;">
        {{ content }}
      </div>
    </div>
  </div>

<script>
(function() {
  var booted = sessionStorage.getItem('axiom-booted');
  var bootScreen = document.getElementById('boot-screen');
  var mainScreen = document.getElementById('main-screen');

  // Scene layout: map CRT onto monitor in the background photo
  var IMG_W = 870, IMG_H = 600; // bg.png native dimensions (cropped)
  var frame = document.querySelector('.scene-frame');
  var housing = document.querySelector('.crt-housing');

  // Monitor screen corners (image coords, calibrated)
  var CORNERS = {
    tl: [308.92, 249.02],
    tr: [475.78, 240.53],
    br: [484.62, 361.51],
    bl: [318.43, 381.22]
  };

  // matrix3d helper: maps a rectangle to an arbitrary quadrilateral
  function computeMatrix3d(w, h, tl, tr, br, bl) {
    var s = [[0,0],[w,0],[w,h],[0,h]];
    var d = [tl, tr, br, bl];
    function adj(m) {
      return [m[4]*m[8]-m[5]*m[7],m[2]*m[7]-m[1]*m[8],m[1]*m[5]-m[2]*m[4],
              m[5]*m[6]-m[3]*m[8],m[0]*m[8]-m[2]*m[6],m[2]*m[3]-m[0]*m[5],
              m[3]*m[7]-m[4]*m[6],m[1]*m[6]-m[0]*m[7],m[0]*m[4]-m[1]*m[3]];
    }
    function mm(a, b) {
      var c = [];
      for (var i = 0; i < 3; i++)
        for (var j = 0; j < 3; j++)
          c[i*3+j] = a[i*3]*b[j] + a[i*3+1]*b[3+j] + a[i*3+2]*b[6+j];
      return c;
    }
    function mv(m, v) {
      return [m[0]*v[0]+m[1]*v[1]+m[2]*v[2],
              m[3]*v[0]+m[4]*v[1]+m[5]*v[2],
              m[6]*v[0]+m[7]*v[1]+m[8]*v[2]];
    }
    function basis(p0, p1, p2, p3) {
      var m = [p0[0],p1[0],p2[0], p0[1],p1[1],p2[1], 1,1,1];
      var v = mv(adj(m), [p3[0], p3[1], 1]);
      return mm(m, [v[0],0,0, 0,v[1],0, 0,0,v[2]]);
    }
    var A = basis(s[0],s[1],s[2],s[3]);
    var B = basis(d[0],d[1],d[2],d[3]);
    var T = mm(B, adj(A));
    for (var i = 0; i < 9; i++) T[i] /= T[8];
    return 'matrix3d(' +
      T[0]+','+T[3]+',0,'+T[6]+','+
      T[1]+','+T[4]+',0,'+T[7]+','+
      '0,0,1,0,'+
      T[2]+','+T[5]+',0,'+T[8]+')';
  }

  var MOBILE_BP = 1024;

  function layoutScene() {
    var vw = window.innerWidth, vh = window.innerHeight;

    // Mobile: full-screen CRT, no scene positioning
    if (vw <= MOBILE_BP) {
      frame.style.display = 'none';
      housing.style.cssText = '';
      var screenW = vw * 0.9;
      var fs = Math.max(12, Math.floor(screenW / 18));
      document.documentElement.style.setProperty('--term-font-size', fs + 'px');
      return;
    }

    frame.style.display = '';
    var sx = vw / IMG_W, sy = vh / IMG_H;
    var s = Math.max(sx, sy);
    var fw = IMG_W * s, fh = IMG_H * s;
    var fl = (vw - fw) / 2;
    var ft = (vh - fh) / 2;
    frame.style.width = fw + 'px';
    frame.style.height = fh + 'px';
    frame.style.left = fl + 'px';
    frame.style.top = ft + 'px';

    // Convert image-space corners to viewport coords
    function i2v(c) { return [fl + (c[0]/IMG_W)*fw, ft + (c[1]/IMG_H)*fh]; }
    var vp = { tl: i2v(CORNERS.tl), tr: i2v(CORNERS.tr),
               br: i2v(CORNERS.br), bl: i2v(CORNERS.bl) };

    // Bounding box of the 4 corners
    var minX = Math.min(vp.tl[0], vp.bl[0]);
    var minY = Math.min(vp.tl[1], vp.tr[1]);
    var maxX = Math.max(vp.tr[0], vp.br[0]);
    var maxY = Math.max(vp.bl[1], vp.br[1]);
    var boxW = maxX - minX, boxH = maxY - minY;

    housing.style.left = minX + 'px';
    housing.style.top = minY + 'px';
    housing.style.width = boxW + 'px';
    housing.style.height = boxH + 'px';

    // Compute matrix3d to warp the rectangle to the quadrilateral
    var rel = {
      tl: [vp.tl[0]-minX, vp.tl[1]-minY],
      tr: [vp.tr[0]-minX, vp.tr[1]-minY],
      br: [vp.br[0]-minX, vp.br[1]-minY],
      bl: [vp.bl[0]-minX, vp.bl[1]-minY]
    };
    housing.style.transformOrigin = '0 0';
    housing.style.transform = computeMatrix3d(boxW, boxH, rel.tl, rel.tr, rel.br, rel.bl);

    // Scale font so ~40 chars fit the screen width
    var screenW = boxW * 0.9;
    var fs = Math.max(8, Math.floor(screenW / 18));
    document.documentElement.style.setProperty('--term-font-size', fs + 'px');
  }

  function start() {
    layoutScene();
    if (booted) {
      mainScreen.style.display = '';
      return;
    }
    bootScreen.style.display = '';
    runBoot();
  }

  // Wait for VT323 so ch units are correct before showing anything
  if (document.fonts && document.fonts.load) {
    document.fonts.load('20px VT323').then(start).catch(start);
  } else {
    start();
  }

  function runBoot() {
  var bootLog = document.getElementById('boot-log');

  var bootLines = [
    { text: 'AXIOM TR-16 FIELD TERMINAL', delay: 0 },
    { text: 'ROM v2.04 — 64K OK', delay: 400 },
    { text: '', delay: 200 },
    { text: 'SCANNING FREQUENCIES...', delay: 600 },
    { text: 'CH7 .... CARRIER FOUND', delay: 900 },
    { text: 'BAUD 2400 N-8-1', delay: 300 },
    { text: '', delay: 200 },
    { text: 'CONNECTING...', delay: 500 },
    { text: '....', delay: 800, typeSpeed: 200 },
    { text: 'CONNECTED.', delay: 400 },
    { text: '', delay: 300 },
  ];

  var lineIndex = 0;

  function typeText(text, element, speed, callback) {
    var i = 0;
    function next() {
      if (i < text.length) {
        element.textContent += text[i];
        i++;
        setTimeout(next, speed);
      } else {
        callback();
      }
    }
    next();
  }

  function printLine() {
    if (lineIndex >= bootLines.length) {
      finishBoot();
      return;
    }

    var line = bootLines[lineIndex];
    lineIndex++;

    if (line.typeSpeed) {
      typeText(line.text, bootLog, line.typeSpeed, function() {
        bootLog.textContent += '\n';
        setTimeout(printLine, line.delay);
      });
    } else {
      bootLog.textContent += line.text + '\n';
      setTimeout(printLine, line.delay);
    }
  }

  function finishBoot() {
    sessionStorage.setItem('axiom-booted', '1');
    bootScreen.style.display = 'none';
    mainScreen.style.display = '';
  }

  setTimeout(printLine, 500);
  } // end runBoot

  layoutScene();
  window.addEventListener('resize', layoutScene);

  // SPA navigation: fetch pages via AJAX and swap screen content
  // to avoid reloading the background image.
  // Uses AbortController so old page event listeners are removed on navigate.
  window.navigateTo = function(url) {
    // Abort old page's event listeners
    if (window._pageAbort) window._pageAbort.abort();
    window._pageAbort = new AbortController();

    fetch(url)
      .then(function(r) { return r.text(); })
      .then(function(html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var newContent = doc.getElementById('main-screen');
        if (newContent) {
          mainScreen.innerHTML = newContent.innerHTML;
          mainScreen.style.display = '';
          // Execute scripts in the new content
          var scripts = mainScreen.querySelectorAll('script');
          scripts.forEach(function(old) {
            var s = document.createElement('script');
            s.textContent = old.textContent;
            old.parentNode.replaceChild(s, old);
          });
          history.pushState(null, '', url);
        } else {
          window.location.href = url;
        }
      })
      .catch(function() { window.location.href = url; });
  };

  window.addEventListener('popstate', function() {
    window.navigateTo(location.pathname);
  });
})();
</script>
</body>
</html>
