<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/crt.css' | relative_url }}">
</head>
<body>
  <div class="rotate-msg">
    <pre>ROTATE TERMINAL TO
LANDSCAPE ORIENTATION</pre>
  </div>
  <div class="crt-housing">
    <div class="crt" id="boot-screen" style="display:none;">
      <div class="crt-glass"></div>
      <div class="screen">
        <div class="screen-content">
          <pre class="terminal-pre" id="boot-log"></pre>
        </div>
      </div>
    </div>

    <div id="main-screen" style="display:none;">
      {{ content }}
    </div>
  </div>

<script>
(function() {
  var booted = sessionStorage.getItem('asfcd-booted');
  var bootScreen = document.getElementById('boot-screen');
  var mainScreen = document.getElementById('main-screen');

  function start() {
    if (booted) {
      mainScreen.style.display = '';
      return;
    }
    bootScreen.style.display = '';
    runBoot();
  }

  // Wait for VT323 so ch units are correct before showing anything
  if (document.fonts && document.fonts.load) {
    document.fonts.load('20px VT323').then(start).catch(start);
  } else {
    start();
  }

  function runBoot() {
  var bootLog = document.getElementById('boot-log');

  var bootLines = [
    { text: 'AXIOM SYSTEMS TR-16 FIELD TERMINAL', delay: 0 },
    { text: 'ROM v2.04 — 64K RAM OK', delay: 400 },
    { text: '', delay: 200 },
    { text: 'SCANNING FREQUENCIES...', delay: 600 },
    { text: 'CHANNEL 7 .... CARRIER DETECTED', delay: 900 },
    { text: 'BAUD 2400 N-8-1', delay: 300 },
    { text: '', delay: 200 },
    { text: 'CONNECTING TO ASFCD BULLETIN SYSTEM', delay: 500 },
    { text: '....', delay: 800, typeSpeed: 200 },
    { text: 'CONNECTED.', delay: 400 },
    { text: '', delay: 300 },
  ];

  var lineIndex = 0;

  function typeText(text, element, speed, callback) {
    var i = 0;
    function next() {
      if (i < text.length) {
        element.textContent += text[i];
        i++;
        setTimeout(next, speed);
      } else {
        callback();
      }
    }
    next();
  }

  function printLine() {
    if (lineIndex >= bootLines.length) {
      finishBoot();
      return;
    }

    var line = bootLines[lineIndex];
    lineIndex++;

    if (line.typeSpeed) {
      typeText(line.text, bootLog, line.typeSpeed, function() {
        bootLog.textContent += '\n';
        setTimeout(printLine, line.delay);
      });
    } else {
      bootLog.textContent += line.text + '\n';
      setTimeout(printLine, line.delay);
    }
  }

  function finishBoot() {
    sessionStorage.setItem('asfcd-booted', '1');
    bootScreen.style.display = 'none';
    mainScreen.style.display = '';
  }

  setTimeout(printLine, 500);
  } // end runBoot
})();
</script>
</body>
</html>
