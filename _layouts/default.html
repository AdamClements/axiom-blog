<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=800, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/crt.css' | relative_url }}">
</head>
<body>
  <div class="rotate-msg">
    <pre>ROTATE TERMINAL TO
LANDSCAPE ORIENTATION</pre>
  </div>
  <div class="scene">
    <div class="scene-frame">
      <img class="scene-img" src="{{ '/assets/bg.png' | relative_url }}" alt="">
    </div>
    <div class="crt-housing">
      <div class="crt" id="boot-screen" style="display:none;">
        <div class="crt-glass"></div>
        <div class="screen">
          <div class="screen-content">
            <pre class="terminal-pre" id="boot-log"></pre>
          </div>
        </div>
      </div>

      <div id="main-screen" style="display:none;">
        {{ content }}
      </div>
    </div>
  </div>

<script>
(function() {
  var booted = sessionStorage.getItem('axiom-booted');
  var bootScreen = document.getElementById('boot-screen');
  var mainScreen = document.getElementById('main-screen');

  // Scene layout: map CRT onto monitor in the background photo
  var IMG_W = 1536, IMG_H = 1024; // bg.png native dimensions
  var frame = document.querySelector('.scene-frame');
  var housing = document.querySelector('.crt-housing');

  // Monitor screen bounds — inset slightly from alpha polygon in bg.png
  // so the bezel always overlaps the terminal edges
  var SCREEN_L = 0.140;
  var SCREEN_T = 0.355;
  var SCREEN_W = 0.188;
  var SCREEN_H = 0.315;

  function layoutScene() {
    var vw = window.innerWidth, vh = window.innerHeight;
    var sx = vw / IMG_W, sy = vh / IMG_H;
    var s = Math.max(sx, sy); // cover
    var fw = IMG_W * s, fh = IMG_H * s;
    // Center the overflow (same as object-fit:cover centering)
    var fl = (vw - fw) / 2;
    var ft = (vh - fh) / 2;
    frame.style.width = fw + 'px';
    frame.style.height = fh + 'px';
    frame.style.left = fl + 'px';
    frame.style.top = ft + 'px';

    // Position CRT housing over the monitor screen
    housing.style.left = (fl + fw * SCREEN_L) + 'px';
    housing.style.top = (ft + fh * SCREEN_T) + 'px';
    housing.style.width = (fw * SCREEN_W) + 'px';
    housing.style.height = (fh * SCREEN_H) + 'px';

    // Scale font so ~58 chars fit the screen width
    var screenW = fw * SCREEN_W * 0.9;
    var fs = Math.max(8, Math.floor(screenW / 36));
    document.documentElement.style.setProperty('--term-font-size', fs + 'px');
  }

  function start() {
    layoutScene();
    if (booted) {
      mainScreen.style.display = '';
      return;
    }
    bootScreen.style.display = '';
    runBoot();
  }

  // Wait for VT323 so ch units are correct before showing anything
  if (document.fonts && document.fonts.load) {
    document.fonts.load('20px VT323').then(start).catch(start);
  } else {
    start();
  }

  function runBoot() {
  var bootLog = document.getElementById('boot-log');

  var bootLines = [
    { text: 'AXIOM SYSTEMS TR-16 FIELD TERMINAL', delay: 0 },
    { text: 'ROM v2.04 — 64K RAM OK', delay: 400 },
    { text: '', delay: 200 },
    { text: 'SCANNING FREQUENCIES...', delay: 600 },
    { text: 'CHANNEL 7 .... CARRIER DETECTED', delay: 900 },
    { text: 'BAUD 2400 N-8-1', delay: 300 },
    { text: '', delay: 200 },
    { text: 'CONNECTING TO AXIOM SYSTEMS', delay: 500 },
    { text: '....', delay: 800, typeSpeed: 200 },
    { text: 'CONNECTED.', delay: 400 },
    { text: '', delay: 300 },
  ];

  var lineIndex = 0;

  function typeText(text, element, speed, callback) {
    var i = 0;
    function next() {
      if (i < text.length) {
        element.textContent += text[i];
        i++;
        setTimeout(next, speed);
      } else {
        callback();
      }
    }
    next();
  }

  function printLine() {
    if (lineIndex >= bootLines.length) {
      finishBoot();
      return;
    }

    var line = bootLines[lineIndex];
    lineIndex++;

    if (line.typeSpeed) {
      typeText(line.text, bootLog, line.typeSpeed, function() {
        bootLog.textContent += '\n';
        setTimeout(printLine, line.delay);
      });
    } else {
      bootLog.textContent += line.text + '\n';
      setTimeout(printLine, line.delay);
    }
  }

  function finishBoot() {
    sessionStorage.setItem('axiom-booted', '1');
    bootScreen.style.display = 'none';
    mainScreen.style.display = '';
  }

  setTimeout(printLine, 500);
  } // end runBoot

  layoutScene();
  window.addEventListener('resize', layoutScene);
})();
</script>
</body>
</html>
