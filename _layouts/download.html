---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <pre class="terminal-pre" id="terminal-text"></pre>
    </div>
  </div>

  <div class="status-bar">
    <span class="keys"><span class="tap-target" data-nav="back"><kbd>Q</kbd> BACK</span></span>
    <span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function() {
  var pre = document.getElementById('terminal-text');
  var ROWS = 14;
  var barWidth = 30;
  var speed = 60;
  var state = 'input';
  var inputCode = '';

  var lines = [];
  for (var i = 0; i < ROWS; i++) lines.push('');

  function setLine(row, text) {
    if (row >= 0 && row < ROWS) lines[row] = text;
  }

  function clearLines() {
    for (var i = 0; i < ROWS; i++) lines[i] = '';
  }

  function render() {
    pre.textContent = lines.join('\n');
  }

  // Prompt at top
  setLine(0, ' AXIOM FIRMWARE REPOSITORY');
  setLine(1, ' FILE: tr16-control-v2.04.bin');
  setLine(2, '');
  setLine(3, ' Enter the verification code from');
  setLine(4, ' page 3 of your printed manual.');
  setLine(5, '');
  setLine(6, ' CODE: █');
  render();

  function renderInput() {
    setLine(6, ' CODE: ' + inputCode + '█');
    render();
  }

  function startDownload() {
    state = 'downloading';
    setLine(6, ' CODE: ' + inputCode);
    setLine(7, ' VALIDATING AGAINST REGISTRY...');
    render();

    setTimeout(function() {
      setLine(7, ' CODE ACCEPTED.');
      setLine(8, ' CONNECTING...');
      render();
      setTimeout(function() {
        setLine(8, ' CONNECTED. DOWNLOADING...');
        setLine(9, '');
        render();
        var progress = 0;
        tick(progress);
      }, 1000);
    }, 1500);
  }

  function tick(progress) {
    progress += Math.random() * 3 + 0.5;
    if (progress > 100) progress = 100;
    var pct = Math.floor(progress);
    var filled = Math.round((pct / 100) * barWidth);
    var empty = barWidth - filled;
    setLine(10, ' [' + Array(filled + 1).join('█') + Array(empty + 1).join('░') + '] ' + pct + '%');
    render();

    if (pct < 100) {
      var delay = speed;
      if (pct > 70 && pct < 90) delay = speed * 3;
      if (pct > 90) delay = speed * 2;
      setTimeout(function() { tick(progress); }, delay);
    } else {
      setTimeout(verify, 800);
    }
  }

  function verify() {
    setLine(12, ' VERIFYING INTEGRITY...');
    render();
    setTimeout(function() {
      setLine(13, ' SCANNING ENVIRONMENT...');
      render();
      setTimeout(fail, 1200);
    }, 1000);
  }

  function fail() {
    state = 'done';
    clearLines();
    setLine(1, ' ██████████████████████████████████████');
    setLine(3, '         DOWNLOAD FAILED');
    setLine(4, '       POTENTIAL AI DETECTED');
    setLine(6, ' ██████████████████████████████████████');
    setLine(8, ' NO MANUALS DISTRIBUTED TO THIS');
    setLine(9, ' SECTOR. CODE ORIGIN UNVERIFIABLE.');
    setLine(11, ' CONNECTION SEVERED BY REMOTE HOST.');
    setLine(12, ' THIS TERMINAL HAS BEEN FLAGGED.');
    render();

    pre.style.color = '#ff3333';
    pre.style.textShadow = '0 0 10px rgba(255,0,0,0.5)';
    setTimeout(function() {
      pre.style.color = '';
      pre.style.textShadow = '';
    }, 3000);
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      window.location.href = '/';
      return;
    }
    if ((e.key === 'q' || e.key === 'Q') && state !== 'input') {
      window.location.href = '/';
      return;
    }

    if (state === 'input') {
      if (e.key === 'Enter' && inputCode.length > 0) {
        e.preventDefault();
        startDownload();
      } else if (e.key === 'Backspace') {
        e.preventDefault();
        inputCode = inputCode.slice(0, -1);
        renderInput();
      } else if (e.key.length === 1 && inputCode.length < 20) {
        if (e.key === 'q' || e.key === 'Q') {
          // Allow Q as input character
        }
        e.preventDefault();
        inputCode += e.key.toUpperCase();
        renderInput();
      }
    }
  });

  var backBtn = document.querySelector('[data-nav="back"]');
  if (backBtn) {
    backBtn.addEventListener('click', function() {
      window.location.href = '/';
    });
  }
})();
</script>
