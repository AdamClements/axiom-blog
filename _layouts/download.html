---
layout: default
---

<div class="crt" id="terminal">
  <div class="crt-glass"></div>
  <div class="screen">
    <div class="screen-content">
      <pre class="terminal-pre" id="terminal-text"></pre>
    </div>
  </div>

  <div class="status-bar">
    <span class="keys"><span class="tap-target" data-nav="back"><kbd>Q</kbd> BACK</span></span>
    <span><span class="cursor"></span></span>
  </div>
</div>

<script>
(function() {
  var pre = document.getElementById('terminal-text');
  var ROWS = 14;
  var barWidth = 30;
  var speed = 60;
  var state = 'input'; // input, downloading, done
  var inputCode = '';

  var lines = [];
  for (var i = 0; i < ROWS; i++) lines.push('');

  function setLine(row, text) {
    if (row >= 0 && row < ROWS) lines[row] = text;
  }

  function clearLines() {
    for (var i = 0; i < ROWS; i++) lines[i] = '';
  }

  function render() {
    pre.textContent = lines.join('\n');
  }

  // Verification code prompt
  setLine(0, ' AXIOM FIRMWARE REPOSITORY');
  setLine(1, ' FILE: tr16-control-v2.04.bin');
  setLine(2, '');
  setLine(3, ' Enter the verification code from');
  setLine(4, ' page 3 of your printed manual.');
  setLine(5, '');
  setLine(6, ' CODE: ' + inputCode + '█');
  render();

  function renderInput() {
    setLine(6, ' CODE: ' + inputCode + '█');
    render();
  }

  function startDownload() {
    state = 'downloading';
    setLine(6, ' CODE: ' + inputCode);
    setLine(7, '');
    setLine(8, ' VERIFYING CODE...');
    render();

    setTimeout(function() {
      setLine(8, ' CODE ACCEPTED.');
      setLine(9, ' CONNECTING TO REPOSITORY...');
      render();
      setTimeout(doDownload, 1200);
    }, 1500);
  }

  function doDownload() {
    setLine(9, ' CONNECTED. DOWNLOADING...');
    setLine(10, '');
    render();
    var progress = 0;

    function tick() {
      progress += Math.random() * 3 + 0.5;
      if (progress > 100) progress = 100;
      var pct = Math.floor(progress);
      var filled = Math.round((pct / 100) * barWidth);
      var empty = barWidth - filled;
      setLine(11, ' [' + Array(filled + 1).join('█') + Array(empty + 1).join('░') + '] ' + pct + '%');
      render();

      if (pct < 100) {
        var delay = speed;
        if (pct > 70 && pct < 90) delay = speed * 3;
        if (pct > 90) delay = speed * 2;
        setTimeout(tick, delay);
      } else {
        setTimeout(fail, 800);
      }
    }
    tick();
  }

  function fail() {
    state = 'done';
    clearLines();
    setLine(3, ' ██████████████████████████████████████');
    setLine(5, '         DOWNLOAD FAILED');
    setLine(6, '       POTENTIAL AI DETECTED');
    setLine(8, ' ██████████████████████████████████████');
    setLine(10, ' CONNECTION SEVERED BY REMOTE HOST.');
    setLine(11, ' THIS TERMINAL HAS BEEN FLAGGED.');
    render();

    pre.style.color = '#ff3333';
    pre.style.textShadow = '0 0 10px rgba(255,0,0,0.5)';
    setTimeout(function() {
      pre.style.color = '';
      pre.style.textShadow = '';
    }, 3000);
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'q' || e.key === 'Q' || e.key === 'Escape') {
      if (state !== 'input' || inputCode.length === 0) {
        window.location.href = '/';
        return;
      }
    }

    if (state === 'input') {
      if (e.key === 'Enter' && inputCode.length > 0) {
        e.preventDefault();
        startDownload();
      } else if (e.key === 'Backspace') {
        e.preventDefault();
        inputCode = inputCode.slice(0, -1);
        renderInput();
      } else if (e.key.length === 1 && inputCode.length < 20) {
        e.preventDefault();
        inputCode += e.key.toUpperCase();
        renderInput();
      }
    }
  });

  var backBtn = document.querySelector('[data-nav="back"]');
  if (backBtn) {
    backBtn.addEventListener('click', function() {
      window.location.href = '/';
    });
  }
})();
</script>
